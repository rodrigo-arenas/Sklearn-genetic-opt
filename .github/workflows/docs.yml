name: Deploy VitePress docs to GitHub Pages

on:
  push:
    branches: [master]
    # Matches release tags like 0.13.0 or v0.13.0
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: write  # write needed to push frozen version back to master on release
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCS_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-vitepress/package.json

      - name: Install dependencies
        working-directory: docs-vitepress
        run: npm install

      - name: Freeze and persist stable version (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "${TAG}" | sed 's/^v//' | grep -oE '^[0-9]+\.[0-9]+')
          echo "Freezing version ${VERSION} from tag ${TAG}"

          cd docs-vitepress
          node scripts/freeze-version.mjs "${VERSION}"
          cd ..

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs-vitepress/
          if git diff --staged --quiet; then
            echo "Version ${VERSION} already frozen — nothing to commit."
          else
            git commit -m "docs: freeze ${VERSION} for release ${TAG}"
            git push origin HEAD:master
          fi

      - name: Build VitePress site
        working-directory: docs-vitepress
        run: npm run docs:build
        env:
          GOOGLE_ANALYTICS_TAG: ${{ secrets.GOOGLE_ANALYTICS_TAG }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-vitepress/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
