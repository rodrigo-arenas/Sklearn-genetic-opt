name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"
      - name: Check formatting
        run: black --check .

  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --upgrade-strategy eager -e ".[test,plot,mlflow]"
      - name: Run tests
        run: pytest sklearn_genetic/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install coverage dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --upgrade-strategy eager -e ".[test,plot,mlflow,tensorflow]"
      - name: Run coverage
        run: |
          pytest sklearn_genetic/ --cov-fail-under=95 --cov=./ --cov-report=term-missing:skip-covered --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-vitepress/package.json
      - name: Install dependencies
        working-directory: docs-vitepress
        run: npm install
      - name: Build VitePress site
        working-directory: docs-vitepress
        run: npm run docs:build

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, tests, coverage, package]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # for checkout
      id-token: write  # for OIDC trusted publishing to PyPI
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sync-conda-recipe:
    name: Sync conda recipe
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCS_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist and compute SHA256
        run: |
          pip install build
          python -m build --sdist
          SHA256=$(python -c "import hashlib,glob; f=glob.glob('dist/*.tar.gz')[0]; print(hashlib.sha256(open(f,'rb').read()).hexdigest())")
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "${TAG}" | sed 's/^v//')
          echo "SHA256=${SHA256}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Update conda recipe source
        run: |
          python - <<'EOF'
          import re, pathlib, os
          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]
          sdist_url = (
              f"https://pypi.io/packages/source/s/sklearn-genetic-opt/"
              f"sklearn_genetic_opt-{version}.tar.gz"
          )
          recipe = pathlib.Path("conda.recipe/meta.yaml").read_text()
          new_source = f"source:\n  url: {sdist_url}\n  sha256: {sha256}"
          recipe = re.sub(
              r"source:\n(?:  #[^\n]*\n)*  path: \.\.",
              new_source,
              recipe,
          )
          pathlib.Path("conda.recipe/meta.yaml").write_text(recipe)
          print(f"Updated conda recipe for {version}")
          EOF

      - name: Commit and push updated recipe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add conda.recipe/meta.yaml
          if git diff --staged --quiet; then
            echo "No changes to conda recipe."
          else
            git commit -m "ci: update conda recipe for ${{ github.ref_name }}"
            git push origin HEAD:master
          fi
